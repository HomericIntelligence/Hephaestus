name: Release

on:
  push:
    tags:
      - "v*"  # fires for human/PAT tag pushes; auto-tag.yml dispatches explicitly
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (leave blank to use latest tag)"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  pages: write

# Serialize per-tag: this workflow builds, publishes to PyPI, and creates a
# GitHub release — none idempotent. Two runs for the SAME tag must not race
# (double-publish); different tags proceed independently. Key on the resolved
# tag: dispatched runs group on the explicit `tag` input (previously they all
# shared the branch ref's group), tag-push runs group on the tag ref. Never
# cancel a publish in flight, hence cancel-in-progress: false.
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  resolve-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      sha: ${{ steps.resolve.outputs.sha }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag to commit SHA
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [[ "$EVENT_REF" == refs/tags/* ]]; then
            TAG="${EVENT_REF#refs/tags/}"
          else
            TAG="$(git for-each-ref \
              --count=1 \
              --sort=-version:refname \
              --format='%(refname:short)' \
              'refs/tags/v*')"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::No release tag could be resolved" >&2
            exit 1
          fi

          if ! SHA="$(git rev-parse --verify "refs/tags/${TAG}^{commit}")"; then
            echo "::error::Release tag ${TAG} does not resolve to a commit" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag ${TAG} to immutable commit ${SHA}"

  test:
    runs-on: ubuntu-24.04
    needs: resolve-release
    # Unit + integration suites run here; the uv env is cached and dev-install
    # already ran, so both finish well under this budget. 20 min (vs the prior
    # 15) is free insurance so a first-run integration slowdown never aborts a
    # publish (issue #1499).
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Editable install (scripts/ smoke tests spawn subprocesses that import hephaestus)
        run: uv sync --all-groups --all-extras --locked

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        # Mirror the required PR gate (_required.yml integration-tests) so a
        # workflow_dispatch release against an arbitrary commit gets the same
        # sdist-contents / package-import guarantee a merged PR does (issue #1499).
        # --override-ini clears the unit coverage addopts; --strict-markers is safe
        # because the `integration` marker is registered in pyproject.toml.
        run: uv run pytest tests/integration --override-ini="addopts=" -v --strict-markers

  type-check:
    runs-on: ubuntu-24.04
    needs: resolve-release
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Run mypy type checking
        run: uv run mypy

  publish-testpypi:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [resolve-release, test, type-check]
    environment: testpypi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Build package
        shell: bash
        run: |
          # This is the only build of the release dist. build-and-publish
          # downloads the artifact produced here rather than rebuilding, so
          # the bytes smoke-tested against TestPyPI are byte-identical to
          # the bytes promoted to production PyPI.
          #
          # hatch-vcs derives the version from git; a dirty tree would taint it
          # with a +dirty/.devN suffix and publish a wrong version.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty — refusing to build"
            git status --porcelain
            exit 1
          fi
          uv run python -m build
          ls -1 dist/

      - name: Upload dist for reuse by build-and-publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa0  # v4.6.2
        with:
          name: release-dist
          path: dist/
          retention-days: 1

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          # No skip-existing: a re-dispatch for the same tag must publish and
          # smoke-test THIS run's freshly built dist, not silently pass by
          # smoke-testing a stale artifact left on TestPyPI from an earlier
          # partial run. If TestPyPI already has this exact version (e.g. a
          # re-dispatch after a downstream failure with no code change), this
          # step fails loudly — the fix is to yank the stale TestPyPI release
          # or bump the version, not to skip and hope the old upload matches.

      - name: Smoke-install from TestPyPI
        shell: bash
        env:
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          EXPECTED_VERSION="${TAG#v}"
          uv venv /tmp/testpypi-smoke

          # TestPyPI has an index-propagation delay after a successful upload
          # before `pip` can resolve the new release. Retry on "no matching
          # distribution" only; any other pip failure (bad deps, broken wheel)
          # fails immediately rather than burning the full retry window.
          ATTEMPTS=10
          SLEEP_SECONDS=30
          for i in $(seq 1 "$ATTEMPTS"); do
            if OUTPUT=$(uv pip install --python /tmp/testpypi-smoke/bin/python --no-cache-dir \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "HomericIntelligence-Hephaestus==${EXPECTED_VERSION}" 2>&1); then
              echo "$OUTPUT"
              break
            fi
            echo "$OUTPUT"
            if ! echo "$OUTPUT" | grep -qi "no matching distribution\|could not find a version"; then
              echo "::error::pip install failed for a reason other than index propagation — not retrying"
              exit 1
            fi
            if [ "$i" -eq "$ATTEMPTS" ]; then
              echo "::error::TestPyPI release ${EXPECTED_VERSION} did not become installable after $((ATTEMPTS * SLEEP_SECONDS))s"
              exit 1
            fi
            echo "Attempt $i/$ATTEMPTS: not yet propagated, retrying in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
          done

          INSTALLED_VERSION=$(/tmp/testpypi-smoke/bin/python -c "import hephaestus; print(hephaestus.__version__)")
          if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::TestPyPI smoke-install version mismatch: expected ${EXPECTED_VERSION}, got ${INSTALLED_VERSION}"
            exit 1
          fi
          echo "TestPyPI smoke-install passed: ${INSTALLED_VERSION}"

  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [resolve-release, test, type-check, publish-testpypi]
    environment: pypi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Verify tag matches package version
        shell: bash
        env:
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          TAG_VERSION="${TAG#v}"
          # Resolve the version straight from hatch-vcs against the checked-out git
          # tree. This reads the tag, not installed-package metadata, so it is
          # immune to a stale editable install restored from the actions cache
          # (the previous `import hephaestus` check returned "unknown" that way).
          PKG_VERSION=$(uv run hatchling version)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Download dist built by publish-testpypi
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          # PEP 740 / Sigstore provenance — lets consumers cryptographically
          # verify the artifact was built by this workflow run. Requires only
          # `id-token: write`, granted at the top of this file (release.yml:16).
          generate_attestations: true

      - name: Check for existing release
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          # A release may already exist for this tag if it was created
          # manually or by a previous (partially failed) run of this
          # workflow. GitHub marks releases immutable, and an immutable
          # release cannot be updated or have assets added — so the
          # create/update action below must be skipped when one exists.
          if gh release view "$TAG" --json isImmutable -q .isImmutable >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.existing.outputs.exists == 'false'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach build artifacts to existing release
        if: steps.existing.outputs.exists == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          # The release already exists. Try to attach the freshly built
          # artifacts; an immutable release rejects uploads, so treat an
          # upload failure as non-fatal — the package is already on PyPI.
          if gh release upload "$TAG" dist/* --clobber; then
            echo "Attached dist/* to release $TAG."
          else
            echo "::notice::Release $TAG is immutable — build artifacts not attached. The package is published to PyPI."
          fi

  deploy-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [resolve-release, build-and-publish]
    # Publish the pdoc API reference to GitHub Pages only after the package
    # release succeeds, so the online docs always match a version on PyPI.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.resolve-release.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Editable install (pdoc imports hephaestus to introspect signatures)
        run: uv sync --all-groups --all-extras --locked

      - name: Generate API reference (pdoc -> docs/api/)
        run: uv run pdoc ./hephaestus ./hephaestus/agents ./hephaestus/benchmarks ./hephaestus/ci ./hephaestus/cli ./hephaestus/config ./hephaestus/datasets ./hephaestus/discovery ./hephaestus/forensics ./hephaestus/github ./hephaestus/io ./hephaestus/logging ./hephaestus/markdown ./hephaestus/nats ./hephaestus/resilience ./hephaestus/scripts_lib ./hephaestus/system ./hephaestus/utils ./hephaestus/validation ./hephaestus/version --output-dir docs/api

      - name: Verify API reference coverage
        run: uv run hephaestus-check-api-reference --docs-dir docs/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
