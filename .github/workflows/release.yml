name: Release

on:
  push:
    tags:
      - "v*"  # fires for human/PAT tag pushes; auto-tag.yml dispatches explicitly
  workflow_dispatch:
    inputs:
      tag:
        description: "Exact existing vX.Y.Z tag to release"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pages: write

# One PyPI project and one GitHub release namespace are mutated here. Serialize
# all trigger forms across the complete preflight/publication transaction.
concurrency:
  group: hephaestus-release-publication
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-24.04
    # Unit + integration suites run here; the pixi env is cached and dev-install
    # already ran, so both finish well under this budget. 20 min (vs the prior
    # 15) is free insurance so a first-run integration slowdown never aborts a
    # publish (issue #1499).
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache over `.pixi` with a lock-agnostic
          # restore-keys prefix would restore a stale env on top of this
          # --locked install, silently downgrading packages — do not add one.

      - name: Editable install (scripts/ smoke tests spawn subprocesses that import hephaestus)
        run: pixi run dev-install

      - name: Run unit tests
        run: pixi run pytest tests/unit

      - name: Run integration tests
        # Mirror the required PR gate (_required.yml integration-tests) so a
        # workflow_dispatch release against an arbitrary commit gets the same
        # sdist-contents / package-import guarantee a merged PR does (issue #1499).
        # --override-ini clears the unit coverage addopts; --strict-markers is safe
        # because the `integration` marker is registered in pyproject.toml.
        run: pixi run pytest tests/integration --override-ini="addopts=" -v --strict-markers

  type-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache over `.pixi` with a lock-agnostic
          # restore-keys prefix would restore a stale env on top of this
          # --locked install, silently downgrading packages — do not add one.

      - name: Run mypy type checking
        run: pixi run mypy

  release-preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Resolve and validate release tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-${REF_NAME}}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify publication targets are unused
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          python3 scripts/release_rollback.py preflight \
            --tag "$TAG" \
            --repository "$GITHUB_REPOSITORY" \
            --package HomericIntelligence-Hephaestus

  publish-testpypi:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [test, type-check, release-preflight]
    environment: testpypi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          # Manual dispatch always supplies a tag; tag pushes use the pushed ref.
          INPUT_TAG="${{ github.event.inputs.tag }}"
          REF_TAG="${{ github.ref }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [[ "$REF_TAG" == refs/tags/* ]]; then
            TAG="${REF_TAG#refs/tags/}"
          else
            echo "::error::Release dispatch requires an explicit vX.Y.Z tag"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: ${TAG}"
          git checkout "${TAG}"

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache over `.pixi` with a lock-agnostic
          # restore-keys prefix would restore a stale env on top of this
          # --locked install, silently downgrading packages — do not add one.

      - name: Build package
        shell: bash
        run: |
          # This is the only build of the release dist. build-and-publish
          # downloads the artifact produced here rather than rebuilding, so
          # the bytes smoke-tested against TestPyPI are byte-identical to
          # the bytes promoted to production PyPI.
          #
          # hatch-vcs derives the version from git; a dirty tree would taint it
          # with a +dirty/.devN suffix and publish a wrong version.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty — refusing to build"
            git status --porcelain
            exit 1
          fi
          pixi run python -m build
          ls -1 dist/

      - name: Upload dist for reuse by build-and-publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa0  # v4.6.2
        with:
          name: release-dist
          path: dist/
          retention-days: 1

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          # No skip-existing: a re-dispatch for the same tag must publish and
          # smoke-test THIS run's freshly built dist, not silently pass by
          # smoke-testing a stale artifact left on TestPyPI from an earlier
          # partial run. If TestPyPI already has this exact version (e.g. a
          # re-dispatch after a downstream failure with no code change), this
          # step fails loudly — the fix is to yank the stale TestPyPI release
          # or bump the version, not to skip and hope the old upload matches.

      - name: Smoke-install from TestPyPI
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          EXPECTED_VERSION="${TAG#v}"
          pixi run python -m venv /tmp/testpypi-smoke

          # TestPyPI has an index-propagation delay after a successful upload
          # before `pip` can resolve the new release. Retry on "no matching
          # distribution" only; any other pip failure (bad deps, broken wheel)
          # fails immediately rather than burning the full retry window.
          ATTEMPTS=10
          SLEEP_SECONDS=30
          for i in $(seq 1 "$ATTEMPTS"); do
            if OUTPUT=$(/tmp/testpypi-smoke/bin/pip install --no-cache-dir \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "HomericIntelligence-Hephaestus==${EXPECTED_VERSION}" 2>&1); then
              echo "$OUTPUT"
              break
            fi
            echo "$OUTPUT"
            if ! echo "$OUTPUT" | grep -qi "no matching distribution\|could not find a version"; then
              echo "::error::pip install failed for a reason other than index propagation — not retrying"
              exit 1
            fi
            if [ "$i" -eq "$ATTEMPTS" ]; then
              echo "::error::TestPyPI release ${EXPECTED_VERSION} did not become installable after $((ATTEMPTS * SLEEP_SECONDS))s"
              exit 1
            fi
            echo "Attempt $i/$ATTEMPTS: not yet propagated, retrying in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
          done

          INSTALLED_VERSION=$(/tmp/testpypi-smoke/bin/python -c "import hephaestus; print(hephaestus.__version__)")
          if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::TestPyPI smoke-install version mismatch: expected ${EXPECTED_VERSION}, got ${INSTALLED_VERSION}"
            exit 1
          fi
          echo "TestPyPI smoke-install passed: ${INSTALLED_VERSION}"

  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [test, type-check, publish-testpypi]
    environment: pypi

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          # Manual dispatch always supplies a tag; tag pushes use the pushed ref.
          INPUT_TAG="${{ github.event.inputs.tag }}"
          REF_TAG="${{ github.ref }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [[ "$REF_TAG" == refs/tags/* ]]; then
            TAG="${REF_TAG#refs/tags/}"
          else
            echo "::error::Release dispatch requires an explicit vX.Y.Z tag"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: ${TAG}"
          git checkout "${TAG}"

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          locked: true
          # setup-pixi already caches `.pixi` keyed exactly on the pixi.lock
          # hash. A second actions/cache over `.pixi` with a lock-agnostic
          # restore-keys prefix would restore a stale env on top of this
          # --locked install, silently downgrading packages — do not add one.

      - name: Verify tag matches package version
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TAG_VERSION="${TAG#v}"
          # Resolve the version straight from hatch-vcs against the checked-out git
          # tree. This reads the tag, not installed-package metadata, so it is
          # immune to a stale editable install restored from the actions cache
          # (the previous `import hephaestus` check returned "unknown" that way).
          PKG_VERSION=$(pixi run hatchling version)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Download dist built by publish-testpypi
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v6.0.0
        with:
          name: release-dist
          path: dist/

      - name: Stage draft GitHub Release with all assets
        id: draft_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          # PEP 740 / Sigstore provenance — lets consumers cryptographically
          # verify the artifact was built by this workflow run. Requires only
          # `id-token: write`, granted at the top of this file (release.yml:16).
          generate_attestations: true

      - name: Publish prepared GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft_release.outputs.id }}
        run: |
          if [[ ! "$RELEASE_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Draft release action returned an invalid release ID"
            exit 1
          fi
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false

  deploy-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build-and-publish]
    # Publish the pdoc API reference to GitHub Pages only after the package
    # release succeeds, so the online docs always match a version on PyPI.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_TAG: ${{ github.ref }}
        run: |
          # Priority: explicit input > tag-push ref > latest tag (mirrors build-and-publish)
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [[ "$REF_TAG" == refs/tags/* ]]; then
            TAG="${REF_TAG#refs/tags/}"
          else
            TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          fi
          echo "Releasing docs for tag: ${TAG}"
          git checkout "${TAG}"

      - name: Install pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          locked: true

      - name: Editable install (pdoc imports hephaestus to introspect signatures)
        run: pixi run dev-install

      - name: Generate API reference (pdoc -> docs/api/)
        run: pixi run docs

      - name: Verify API reference coverage
        run: pixi run --environment default hephaestus-check-api-reference --docs-dir docs/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
