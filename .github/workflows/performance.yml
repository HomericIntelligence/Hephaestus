name: Performance

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  worker-pool-load:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install locked performance environment
        run: uv sync --all-groups --all-extras --locked
      - name: Verify performance suite collection
        run: >
          uv run pytest tests/performance
          --override-ini="addopts="
          --collect-only -q --strict-markers
      - name: Run bounded worker-pool load tests
        run: >
          uv run pytest tests/performance
          --override-ini="addopts="
          -v --strict-markers
          --load-duration-s=30
          --load-max-jobs=50000
          --load-workers=8
          --load-max-in-flight=64
          --load-service-ms=5
          --load-p95-budget-ms=500
          --load-report=build/performance/worker-pool.json
      - name: Upload performance report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: worker-pool-performance
          path: build/performance/worker-pool.json
          if-no-files-found: warn
          retention-days: 14
