# Platform scope: Linux-only. The pixi environment targets linux-64 (see
# pixi.toml [workspace] platforms); macOS/Windows CI is out of scope and
# tracked in #539. Published wheels remain pure-Python importable elsewhere.
# When #539 lands, expand the matrix to include macOS and Windows runners.
name: Required Checks

on:
  pull_request:
    # Default types are [opened, synchronize, reopened], which do NOT fire when
    # auto-merge is toggled or labels are changed after PR creation — so
    # auto-merge-policy's check was stuck with its PR-open verdict until the
    # next push (the race that #680 papered over with `needs: lint`).
    # Re-running on auto_merge_enabled / auto_merge_disabled, labeled /
    # unlabeled, ready_for_review, and edited makes those gates converge on the
    # true state with no timing reliance. See auto-merge-policy below.
    #
    # IMPORTANT: a pull_request trigger applies to the WHOLE workflow, so the
    # label / auto-merge / edited event types would otherwise re-run EVERY job
    # on each metadata change. Those five actions exist solely for pr-policy /
    # auto-merge-policy to re-converge, so the `changes-gate` job below gates the
    # 16 heavy jobs to skip on labeled/unlabeled/auto_merge_enabled/
    # auto_merge_disabled/edited — only the two policy jobs run on those events. The
    # heavy jobs' results from the last code push still stand for the SHA, so
    # branch-protection required checks remain satisfied.
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
      - auto_merge_enabled
      - auto_merge_disabled
      - edited
  push:
    branches: [main]

concurrency:
  group: required-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Decides whether this event should run the 16 heavy jobs. A pull_request
  # trigger fires the whole workflow, but the labeled / unlabeled /
  # auto_merge_enabled / auto_merge_disabled / edited actions exist only so
  # pr-policy and auto-merge-policy re-converge — the heavy jobs must NOT re-run
  # on them. This
  # job always runs (no gate on itself) and the heavy jobs `needs:` it.
  # ``github.event.action`` is a GitHub-controlled enum (empty on `push`), passed
  # via env: and never interpolated into the script — injection-safe.
  changes-gate:
    name: changes-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      code_event: ${{ steps.decide.outputs.code_event }}
    steps:
      - name: Decide whether this event runs the heavy jobs
        id: decide
        env:
          ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          # Heavy jobs skip on policy-only PR actions. `push` has no action
          # (empty) → falls to the default → code_event=true.
          case "$ACTION" in
            labeled | unlabeled | auto_merge_enabled | auto_merge_disabled | edited)
              echo "code_event=false" >> "$GITHUB_OUTPUT"
              echo "Policy-only event ($ACTION) — heavy jobs skipped; only policy jobs run."
              ;;
            *)
              echo "code_event=true" >> "$GITHUB_OUTPUT"
              echo "Code event (${ACTION:-push}) — heavy jobs run."
              ;;
          esac

  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            msg='::error::Found "continue-on-error: true" above.'
            msg+=' Fix the root cause per HomericIntelligence/Odysseus#280.'
            echo "$msg"
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

      - name: "Reject advisory annotation pattern"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          # The advisory-annotation pattern in workflow run blocks is morally
          # equivalent to continue-on-error: true: it lets a tool fail without
          # failing the CI step. The runbook (Bucket F) requires every tool
          # to be fail-fast. The only legitimate annotation is informational
          # text not tied to a tool's exit code — those should use
          # echo "WARN:" to stdout instead. See docs/runbooks/no-silent-failures.md.
          declare -a scan_files=()
          for f in "${files[@]}"; do
            # Exempt this workflow file (heredoc would otherwise self-match).
            case "$f" in
              .github/workflows/_required.yml) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nF '::warning::' "${scan_files[@]}"; then
            echo ""
            msg='::error::Found advisory annotations above.'
            msg+=' Make the underlying tool fail-fast or use echo "WARN:" to stdout.'
            msg+=' See HomericIntelligence/Odysseus#282 Bucket F.'
            echo "$msg"
            exit 1
          fi
          echo 'OK: no advisory annotations found'

  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      # Single source of truth for linting: run the full pre-commit hook suite.
      # ruff-check, ruff-format, yamllint, and mypy all run as pre-commit hooks,
      # so invoking them as separate steps here would duplicate that work. The
      # standalone "Pre-commit" workflow was folded into this required `lint`
      # job (issue #1173) so that the WHOLE hook suite is a required status
      # check — previously pre-commit was advisory, which let an unformatted
      # file land on main via #959 and break pre-commit for every later PR.
      - name: Setup pixi env (lint)
        uses: ./.github/actions/setup-pixi-env
        with:
          environments: lint
          cache-key-prefix: pixi-lint

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Cache mypy incremental cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          # Persist incremental cache so the full-tree mypy hook (pass_filenames: false)
          # re-checks only changed modules across CI runs. See issue #1503.
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('pixi.lock', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Run pre-commit (all hooks)
        run: |
          # Several hooks (check-dep-sync, check-unit-test-structure, the
          # hephaestus-* catalog checks) invoke `pixi run hephaestus-*`, which
          # resolves against the default env, so install it and the package too.
          pixi install --environment default
          pixi run dev-install
          pixi run --environment lint pre-commit run --all-files --show-diff-on-failure

      - name: Upload pre-commit diff
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pre-commit-diffs
          retention-days: 7
          path: |
            .git/pre-commit-*

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [lint, changes-gate]
    if: needs.changes-gate.outputs.code_event == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          cache: true
      - name: pixi install (locked)
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::error::pixi.toml present but pixi.lock missing; refusing unlocked install"
            exit 1
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [lint, changes-gate]
    if: needs.changes-gate.outputs.code_event == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: [lint, changes-gate]
    if: needs.changes-gate.outputs.code_event == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: [lint, changes-gate]
    if: needs.changes-gate.outputs.code_event == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(scripts/*.sh scripts/shell/*.sh)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No shell scripts found — nothing to lint."
            exit 0
          fi
          # severity=error catches genuine bugs (unquoted vars in dangerous
          # contexts, broken syntax) without bikeshedding on style — matches
          # the bug class that broke the AchaeanFleet automation loop.
          shellcheck --severity=error "${files[@]}"

  pr-policy:
    name: pr-policy
    # Enforces the hard repo PR policies on every PR. Every check is gated by
    # `if: always()` so one failure still surfaces the others:
    #   1. PR body contains `Closes #N` on its own line.
    #   2. Every commit on the PR has a verified signature.
    #   3. The PR title and every commit subject follow Conventional Commits.
    #   4. Every commit has a DCO Signed-off-by trailer.
    # The auto-merge ↔ implementation-review state machine moved to the separate
    # `auto-merge-policy` job (#1080) so its timing-sensitive verdict no longer
    # blocks merge — it is intentionally NOT in the required-checks ruleset.
    # Push events are skipped because there is no PR to inspect.
    #
    # This gate intentionally has NO `needs:` — it runs immediately so the body
    # and signature checks report without depending on another job's timing.
    # The earlier `needs: lint` workaround (#680) only delayed the read and left
    # a required-check-skipped-on-lint-failure wrinkle.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      # Check 3 invokes scripts/check_conventional_commit.py from the repo tree,
      # so the source must be on disk. Pin the checkout to the PR head SHA: the
      # default bare checkout resolves refs/pull/N/merge, which GitHub computes
      # asynchronously and can lag a fresh push — checking out a merge commit
      # that predates the validator and so misses the script. The head SHA is an
      # immutable object id (not an attacker-controllable ref name), and the
      # validator ships with the PR until it lands on main.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: "Fetch PR metadata"
        id: fetch
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          # `gh pr view --json body,title` exposes the PR body and the title that
          # becomes the squash subject, but not per-commit signatures; the
          # GraphQL API supplies those. (The auto-merge/labels read moved to
          # auto-merge-policy.)
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json body,title \
            > pr.json
          gh api graphql \
            -f query='query($owner:String!,$name:String!,$pr:Int!) {
              repository(owner:$owner, name:$name) {
                pullRequest(number:$pr) {
                  commits(first:100) {
                    nodes {
                      commit {
                        oid
                        message
                        signature { isValid state }
                      }
                    }
                  }
                }
              }
            }' \
            -F owner="$REPO_OWNER" -F name="$REPO_NAME" -F pr="$PR_NUMBER" \
            > commits.json
          echo "Fetched metadata for PR #$PR_NUMBER"

      - name: "Check 1: PR body contains 'Closes #N'"
        if: always() && steps.fetch.outcome == 'success'
        env:
          # PR author login (github.event.pull_request.user.login), passed via
          # env so the untrusted value never interpolates into the run script.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          # Dependabot PR bodies are auto-generated and structurally never carry
          # a `Closes #N` line. Exempt ONLY this body check for dependabot[bot]
          # (#1070) — Check 2 (signing) and the auto-merge-policy job still apply.
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "OK: Dependabot PR — 'Closes #N' body check is not applicable"
            exit 0
          fi
          # jq -r reads the untrusted body into a shell variable; downstream
          # use is `printf '%s\n' "$body" | grep`, which never word-splits or
          # interprets the body as a command, so injection is not possible.
          body=$(jq -r '.body // ""' pr.json)
          if printf '%s\n' "$body" | grep -qE '^Closes #[0-9]+[[:space:]]*$'; then
            echo "OK: PR body contains a Closes #N line"
          else
            msg='::error::PR body must contain a line matching `^Closes #N$`'
            msg+=' (literal "Closes", capital C, on its own line). See CLAUDE.md PR policy.'
            echo "$msg"
            exit 1
          fi

      - name: "Check 2: every commit is signed"
        if: always() && steps.fetch.outcome == 'success'
        run: |
          set -euo pipefail
          # Build "<oid> <isValid>" rows from the GraphQL response. A null
          # signature object means an unsigned commit, which the // false
          # default coerces to false (rather than dropping the row).
          bad=$(jq -r '.data.repository.pullRequest.commits.nodes[]
                       | "\(.commit.oid) \(.commit.signature.isValid // false)"' commits.json \
                | awk '$2 != "true" { print $1 }')
          if [ -n "$bad" ]; then
            echo "::error::The following commits are unsigned or have invalid signatures:"
            # shellcheck disable=SC2086  # word-splitting of $bad is intentional
            printf '  %s\n' $bad
            msg="::error::Every commit MUST be cryptographically signed."
            msg+=" Re-sign with: git rebase --exec 'git commit --amend --no-edit -S -s' origin/main"
            echo "$msg"
            exit 1
          fi
          echo "OK: all commits have verified signatures"

      - name: "Check 3: PR title and commit subjects follow Conventional Commits"
        if: always() && steps.fetch.outcome == 'success'
        run: |
          set -euo pipefail
          # The required squash merge uses the PR title as the main subject;
          # Git machinery forms are not authored titles and are rejected here.
          jq -r '.title // ""' pr.json \
            | python3 scripts/check_conventional_commit.py --strict -

          # Branch commits retain local-hook compatibility with Git machinery.
          jq -r '.data.repository.pullRequest.commits.nodes[]
                 | .commit.message | split("\n")[0]' commits.json \
            | python3 scripts/check_conventional_commit.py -

      - name: "Check 4: every commit carries a DCO Signed-off-by trailer"
        if: always() && steps.fetch.outcome == 'success'
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          # Dependabot commits are bot-authored, not human DCO attestations;
          # exempt like Check 1 (#1070).
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "OK: Dependabot PR — DCO sign-off check is not applicable"
            exit 0
          fi
          # Full commit message per node, NUL-separated (the trailer lives in
          # the body, so unlike Check 3 we keep the whole message). Reuses the
          # commits.json already fetched above. Empty set passes by design.
          jq -j '.data.repository.pullRequest.commits.nodes[]
                 | .commit.message + "\u0000"' commits.json \
            | python3 scripts/check_dco_signoff.py -

  auto-merge-policy:
    name: auto-merge-policy
    # Advisory (NOT a required check): #2054 temporarily makes every automatic
    # armer fail closed while #2055 introduces the head-bound strict-review gate.
    # This job signals any still-armed open PR but intentionally does not block
    # manual bootstrap merges after an independent strict review.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: "Auto-merge remains disabled pending strict-review gate"
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json autoMergeRequest,labels,state \
            > pr.json
          if ! jq -e '
              type == "object"
              and has("state")
              and has("autoMergeRequest")
              and (.state | type == "string")
              and (.state == "OPEN" or .state == "MERGED" or .state == "CLOSED")
              and (.autoMergeRequest == null or (.autoMergeRequest | type == "object"))
            ' pr.json > /dev/null; then
            echo "::error::Incomplete PR state response; cannot verify auto-merge is disabled."
            exit 1
          fi
          pr_state=$(jq -r '.state' pr.json)
          if [ "$pr_state" != "OPEN" ]; then
            echo "OK: PR state is $pr_state; auto-merge policy is terminal"
            exit 0
          fi

          state=$(jq -r '.autoMergeRequest' pr.json)
          if [ "$state" != "null" ] && [ -n "$state" ]; then
            msg="::error::Auto-merge is enabled while the strict-review gate is unavailable."
            msg+=" Remove it with: gh pr merge $PR_NUMBER --disable-auto"
            echo "$msg"
            exit 1
          fi
          echo "OK: auto-merge is disabled pending the queue-owned strict-review gate"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history + tags so test_version_currency can resolve the
          # latest vX.Y.Z tag for the doc-version-drift guard (#1233).
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install Pi CLI
        uses: ./.github/actions/setup-pi-cli

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Install package
        run: pip install -e ".[dev,schema,automation]"

      - name: Run unit tests
        run: |
          pytest tests/unit --override-ini="addopts=" -v --strict-markers \
            --cov=hephaestus --cov-report=term-missing --cov-report=xml

      - name: Check unit test structure
        # Use the strict CLI (also flags loose test_*.py files at tests/unit/ root).
        run: hephaestus-check-test-structure

      - name: Check per-module coverage floors
        run: pip install -e ".[xml]" && hephaestus-check-coverage --coverage-file coverage.xml --config coverage.toml

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-

      - name: Install package
        run: pip install -e ".[dev,automation]"

      - name: Run integration tests
        run: pytest tests/integration --override-ini="addopts=" -v --strict-markers

  shell-tests:
    name: shell-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup pixi env (default)
        uses: ./.github/actions/setup-pixi-env
        with:
          cache-key-prefix: pixi-shell

      - name: Run bats shell tests
        run: pixi run test-shell

  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-build-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-3.12-build-

      - name: Install build deps
        run: pip install build hatchling hatch-vcs

      - name: Build wheel and sdist
        run: python -m build --no-isolation

      - name: Smoke-test installed wheel
        run: |
          pip install dist/homericintelligence_hephaestus-*.whl --force-reinstall
          python -c "import hephaestus; print('Package version:', hephaestus.__version__)"
          python -c "from hephaestus import slugify, retry_with_backoff, setup_logging; print('OK')"

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup pixi env (lint)
        uses: ./.github/actions/setup-pixi-env
        with:
          environments: lint
          cache-key-prefix: pixi-lint

      - name: Run pip-audit
        id: pip-audit
        run: pixi run --environment lint pip-audit

      - name: Post pip-audit summary
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.pip-audit.outcome }}
        run: |
          {
            echo "## pip-audit Security Scan"
            echo ""
            if [ "$AUDIT_OUTCOME" = "success" ]; then
              echo "No HIGH/CRITICAL vulnerabilities found."
            else
              echo "Vulnerabilities detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      # Digest-pinned so the scan no longer depends on a transient GitHub
      # Releases tarball URL (audit #1483). gitleaks is not published on
      # conda-forge or PyPI, so a Pixi-managed install cannot be locked; the
      # container digest is the reproducible pin instead. Run via `docker
      # run` rather than a job-level `container:` — the gitleaks image is
      # musl-based Alpine with no Node.js runtime, which breaks
      # actions/checkout (a glibc-linked JS action) when it executes inside
      # the container.
      - name: Run Gitleaks
        env:
          GITLEAKS_IMAGE: >-
            ghcr.io/gitleaks/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9
        run: |
          set -euo pipefail
          args=(detect --source=. --verbose --exit-code=1)
          if [ -f .gitleaks.toml ]; then
            args+=(--config=.gitleaks.toml)
          fi
          docker run --rm -v "$PWD:/repo" -w /repo "$GITLEAKS_IMAGE" "${args[@]}"

  security-sast-scan:
    name: security/sast-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup pixi env (lint)
        uses: ./.github/actions/setup-pixi-env
        with:
          environments: lint
          cache-key-prefix: pixi-lint

      - name: Run bandit (SAST)
        id: bandit
        run: pixi run --environment lint sast

      - name: Post bandit summary
        if: always()
        env:
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
        run: |
          {
            echo "## Bandit Static Application Security Testing"
            echo ""
            if [ "$BANDIT_OUTCOME" = "success" ]; then
              echo "No security issues found."
            else
              echo "Security issues detected — see job logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate GitHub workflow schemas
        run: |
          set -euo pipefail
          # Use check-jsonschema's bundled `vendor.github-workflows` schema so
          # the job is network-free and fail-fast. No schemastore.org probe and
          # no advisory `::warning::` outage fallback (Bucket F anti-pattern).
          mapfile -t wf_files < <(find .github/workflows -name "*.yml")
          if [ "${#wf_files[@]}" -eq 0 ]; then
            echo "No workflow files to validate"
            exit 0
          fi
          check-jsonschema \
            --builtin-schema vendor.github-workflows \
            "${wf_files[@]}"

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install package (for __version__ and checker imports)
        # Install WITH deps: the single-source checker imports
        # ``hephaestus.utils.helpers``, which imports ``packaging`` (a declared
        # core dependency). ``--no-deps`` would skip ``packaging`` and the
        # checker below would ModuleNotFoundError instead of asserting.
        run: pip install -e "."

      - name: Check version single-source-of-truth (pyproject + pixi.toml)
        run: |
          set -euo pipefail

          # Diagnostics (informational only).
          PKG_VERSION=$(python -c "import hephaestus; print(hephaestus.__version__)")
          echo "Installed __version__: $PKG_VERSION"

          # ENFORCEMENT (legs 1+2): the tested checker asserts there is no
          # static [project].version, that version is in [project].dynamic,
          # that [tool.hatch.version].source == "vcs", and that pixi.toml has
          # no [workspace].version. Under `set -e` a non-zero exit fails the
          # job — this is the live exit-1 path the old dead VERSION-file
          # branch never provided.
          #
          # Invoked as an installed module (-m) rather than the scripts/ shim:
          # the module form is immune to sys.path[0]/CWD-dependent __file__
          # resolution, so the checker's get_repo_root() anchors to the
          # installed package and reads the checked-out pyproject.toml.
          python -m hephaestus.scripts_lib.check_version_single_source

      - name: Set up pixi (for lockfile sync check)
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.69.0
          cache: true

      - name: Check pixi.lock is in sync with pixi.toml
        run: |
          set -euo pipefail
          # ENFORCEMENT (leg 3): the DoD names this job for the full
          # "pyproject.toml then pixi.toml then pixi.lock" contract
          # (docs/DEFINITION_OF_DONE.md:28). The checker above covers
          # pyproject + pixi.toml but never reads pixi.lock. `pixi install
          # --locked` exits non-zero if pixi.toml changed without re-locking
          # — the same frozen-verification the pixi-check job uses, and a
          # command guaranteed available in the repo-pinned pixi v0.69.0.
          pixi install --locked

  license-scan:
    name: license-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: changes-gate
    if: needs.changes-gate.outputs.code_event == 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # hatch-vcs needs full history to compute the version

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
          cache: pip  # cache wheels so a PyPI hiccup does not flake the gate

      # Install the package + ALL runtime extras (with deps) on a bare runner,
      # NOT inside pixi: pip and pixi co-managing site-packages causes lockfile
      # churn (see security.yml comment). .[all] is required so
      # distributed_requirements() can read every runtime extra's Requires-Dist.
      - name: Install package with all runtime extras
        run: pip install -e ".[all]"

      - name: Run license scan
        id: license-scan
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 scripts/check_license_compatibility.py

      - name: Post license-scan summary
        if: always()
        env:
          LICENSE_OUTCOME: ${{ steps.license-scan.outcome }}
        run: |
          {
            echo "## License Compatibility Scan"
            echo ""
            if [ "$LICENSE_OUTCOME" = "success" ]; then
              echo "All distributed dependency licenses compatible with BSD-3-Clause (see NOTICE)."
            else
              echo "Non-compatible license or coverage gap detected — see job logs and NOTICE."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # required-checks-gate is an aggregate workflow-level signal and a classic
  # branch-protection context, alongside the repository ruleset's direct
  # required contexts. It fans in every gating job above so the full workflow
  # has one auditable result; add every new gating job to `needs:`. Update the
  # GitHub ruleset deliberately only when that job also needs its own direct
  # ruleset context. See docs/ci/required-checks.md and the guard test
  # tests/unit/ci/test_required_checks_gate.py.
  #
  # `if: always()` is mandatory: the heavy jobs skip on label / auto-merge PR
  # actions (they gate on changes-gate.code_event), so without always() this job
  # would itself skip and report neither success nor failure — deadlocking a
  # required check. The step below PASSES when every needed job is `success` or
  # `skipped` (skipped = legitimately gated off) and FAILS on `failure` /
  # `cancelled`. auto-merge-policy is intentionally EXCLUDED — it is advisory
  # (see the comment on that job) and must not gate merges.
  required-checks-gate:
    name: required-checks-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: always()
    needs:
      - changes-gate
      - forbid-suppressions
      - lint
      - pixi-check
      - justfile-check
      - symlink-check
      - shellcheck
      - pr-policy
      - unit-tests
      - integration-tests
      - shell-tests
      - build
      - security-dependency-scan
      - security-secrets-scan
      - security-sast-scan
      - schema-validation
      - deps-version-sync
      - license-scan
    steps:
      - name: Verify no required job failed or was cancelled
        env:
          # `needs` is a GitHub-controlled object; passed via env and parsed by
          # the stdlib json module — never interpolated into the shell, so this
          # is injection-safe.
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$RESULTS" | python3 -c '
          import json
          import sys

          needs = json.load(sys.stdin)
          bad = {
              name: outcome["result"]
              for name, outcome in needs.items()
              if outcome["result"] not in ("success", "skipped")
          }
          if bad:
              print("Required jobs not green:", json.dumps(bad, sort_keys=True))
              sys.exit(1)
          print("All required jobs green or legitimately skipped.")
          '
